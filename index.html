<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Username Generator</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        body {
            background-color: #0f0f11;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }
        h2 {
            color: #ff6b6b;
            text-shadow: 0 0 10px #ff6b6b55;
            margin-bottom: 30px;
            text-align: center;
        }
        .input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 400px;
        }
        input {
            flex: 1;
            padding: 12px 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1e;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #ff6b6b;
            box-shadow: 0 0 8px #ff6b6b44;
        }
        button {
            padding: 12px 20px;
            cursor: pointer;
            background: #ff6b6b;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover {
            background: #ff4c4c;
            transform: translateY(-2px);
        }
        #results {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 900px;
            justify-content: center;
        }
        .username-card {
            background: #1a1a1e;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #2a2a30;
            font-size: 17px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
        }
        .username-card:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.2);
        }
    </style>
</head>
<body>

    <h2>🔥 Elite Surname Generator 🔥</h2>
    
    <div class="input-container">
        <input type="text" id="nameInput" placeholder="Masukin nama lu (misal: ken)" autocomplete="off" />
        <button onclick="generateUsernames()">Generate!</button>
    </div>

    <div id="results"></div>

    <script>
        function generateUsernames() {
            const rawName = document.getElementById('nameInput').value.trim();
            const resultsDiv = document.getElementById('results');
            
            // Clear hasil sebelumnya
            resultsDiv.innerHTML = '';

            if (!rawName) {
                alert("Masukin nama dulu brok!");
                return;
            }

            const baseName = rawName.toLowerCase();
            const capName = baseName.charAt(0).toUpperCase() + baseName.slice(1);
            const initial = baseName.charAt(0).toUpperCase();

            // --- DATABASE MARGA ELIT / NGGAK PASARAN ---
            const eliteSurnames = [
                "O'Brien", "Sinclair", "Vesper", "Thorne", 
                "Sterling", "Blackwood", "Carmichael", "Valois", 
                "Mercer", "Cross", "Belmont", "Holloway", 
                "Lancaster", "Devereux", "Gallagher"
            ];

            // Tambahan prefix/suffix estetik biar makin bervariasi
            const aestheticPrefixes = ["kx.", "vamp.", "saint.", "lord.", "arch."];

            let results = new Set(); 

            // 1. Kombinasi Marga Klasik (Contoh: Ken Sinclair)
            eliteSurnames.forEach(surname => {
                results.add(`${capName} ${surname}`);
            });

            // 2. Kombinasi Underscore / Titik buat IG (Contoh: ken.vesper, ken_blackwood)
            eliteSurnames.forEach(surname => {
                let lowerSurname = surname.toLowerCase().replace("'", ""); // Hilangin tanda petik buat username IG
                results.add(`${baseName}.${lowerSurname}`);
                results.add(`${baseName}_${lowerSurname}`);
            });

            // 3. Format Inisial Depan (Contoh: K. Sterling, K.Holloway)
            eliteSurnames.forEach(surname => {
                results.add(`${initial}. ${surname}`);
                results.add(`${initial}.${surname.toLowerCase()}`);
            });

            // 4. Format Digabung / Tanpa Spasi (Contoh: kencarmichael)
            eliteSurnames.forEach(surname => {
                let lowerSurname = surname.toLowerCase().replace("'", "");
                results.add(`${baseName}${lowerSurname}`);
            });

            // 5. Tambahan Prefix Estetik + Marga (Contoh: kx.ken.thorne)
            aestheticPrefixes.forEach(prefix => {
                let randomSurname = eliteSurnames[Math.floor(Math.random() * eliteSurnames.length)].toLowerCase().replace("'", "");
                results.add(`${prefix}${baseName}.${randomSurname}`);
            });

            // --- RENDER KE LAYAR ---
            results.forEach(uname => {
                const div = document.createElement('div');
                div.className = 'username-card';
                div.textContent = uname;
                
                div.onclick = () => {
                    navigator.clipboard.writeText(uname);
                    div.style.borderColor = "#4caf50";
                    div.style.color = "#4caf50";
                    setTimeout(() => {
                        div.style.borderColor = "#2a2a30";
                        div.style.color = "#e0e0e0";
                    }, 500);
                };
                
                resultsDiv.appendChild(div);
            });
        }

        document.getElementById("nameInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                generateUsernames();
            }
        });
    </script>
</body>
</html>
